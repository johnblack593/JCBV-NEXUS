version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════
  #  NEXUS HFT Core — Daemon de Trading Autónomo
  # ═══════════════════════════════════════════════════════════════
  nexus-core:
    build: .
    container_name: nexus-hft-daemon
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=PRODUCTION
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./config:/app/config
    env_file:
      - .env
    networks:
      - nexus-net
    depends_on:
      - redis

  # ═══════════════════════════════════════════════════════════════
  #  Redis — Estado compartido (Circuit Breaker, Session Lock)
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nexus-net
    command: redis-server --appendonly yes

  # ═══════════════════════════════════════════════════════════════
  #  Prometheus — Recolección de Métricas
  # ═══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nexus-net

  # ═══════════════════════════════════════════════════════════════
  #  Grafana — Dashboard de Observabilidad
  # ═══════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=nexus
      - GF_SECURITY_ADMIN_PASSWORD=nexus2026
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/nexus.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - nexus-net

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  nexus-net:
    driver: bridge
