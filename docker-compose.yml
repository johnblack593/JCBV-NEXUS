services:
  # ═══════════════════════════════════════════════════════════════
  #  NEXUS HFT Core — Daemon de Trading Autónomo v4.0
  # ═══════════════════════════════════════════════════════════════
  nexus-core:
    build: .
    container_name: nexus-hft-daemon
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=PRODUCTION
      - TZ=${TZ:-America/Guayaquil}
      - QUESTDB_REST_HOST=nexus-questdb
      - QUESTDB_PG_HOST=nexus-questdb
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./config:/app/config
    env_file:
      - .env
    networks:
      - nexus-net
    depends_on:
      redis:
        condition: service_healthy
      questdb:
        condition: service_started

  # ═══════════════════════════════════════════════════════════════
  #  Redis — Estado Atómico (Circuit Breaker, MACRO_REGIME, Locks)
  #  Healthcheck estricto: 3 reintentos, 5s intervalo
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nexus-net
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ═══════════════════════════════════════════════════════════════
  #  QuestDB — Data Lake Institucional (Ticks, AggTrades, L2)
  #  PostgreSQL wire: 8812 | REST/Web Console: 9000 | ILP: 9009
  # ═══════════════════════════════════════════════════════════════
  questdb:
    image: questdb/questdb:8.2.1
    container_name: nexus-questdb
    restart: unless-stopped
    ports:
      - "9000:9000" # Web Console + REST API
      - "8812:8812" # PostgreSQL wire protocol
      - "9009:9009" # InfluxDB Line Protocol (ILP) ingestion
    volumes:
      - questdb-data:/var/lib/questdb
    environment:
      - QDB_CAIRO_COMMIT_LAG=1000
      - QDB_SHARED_WORKER_COUNT=2
      - QDB_PG_USER=${QUESTDB_PG_USER:-admin}
      - QDB_PG_PASSWORD=${QUESTDB_PG_PASSWORD:-quest}
    networks:
      - nexus-net

  # ═══════════════════════════════════════════════════════════════
  #  Prometheus — Recolección de Métricas
  # ═══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nexus-net

  # ═══════════════════════════════════════════════════════════════
  #  Grafana — Dashboard de Observabilidad Institucional
  #  Credenciales movidas a .env (Zero Hardcode)
  # ═══════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-nexus}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/nexus.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - questdb
    networks:
      - nexus-net

  # ═══════════════════════════════════════════════════════════════
  #  NEXUS Commander — Operational Control Panel SPA (Vite/React)
  #  Port 3001 to avoid Grafana conflicts.
  # ═══════════════════════════════════════════════════════════════
  nexus-commander:
    build:
      context: ./nexus-commander
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000/ws
    container_name: nexus-commander-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - nexus-core
    networks:
      - nexus-net

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  questdb-data:


networks:
  nexus-net:
    driver: bridge
